# Render.com Blueprint for AgentOps Platform
# Deploy this at: https://dashboard.render.com/blueprint

services:
  # Frontend - React SPA
  - type: web
    name: agentops-frontend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -p 3000
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://agentops-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend - FastAPI
  - type: web
    name: agentops-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentops-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agentops-redis
          property: connectionString
      - key: ENVIRONMENT
        value: staging
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        value: https://agentops-frontend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: API_KEY_SALT
        generateValue: true
    healthCheckPath: /health
    healthCheckPort: 8000

  # Celery Worker
  - type: worker
    name: agentops-worker
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.worker worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentops-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agentops-redis
          property: connectionString
      - key: ENVIRONMENT
        value: staging
      - key: JWT_SECRET
        value: ${agentops-backend.JWT_SECRET}
      - key: ENCRYPTION_KEY
        value: ${agentops-backend.ENCRYPTION_KEY}
      - key: LOG_LEVEL
        value: info

  # Celery Beat (Scheduler)
  - type: worker
    name: agentops-scheduler
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: celery -A app.worker beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agentops-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agentops-redis
          property: connectionString
      - key: ENVIRONMENT
        value: staging
      - key: JWT_SECRET
        value: ${agentops-backend.JWT_SECRET}
      - key: ENCRYPTION_KEY
        value: ${agentops-backend.ENCRYPTION_KEY}
      - key: LOG_LEVEL
        value: info

databases:
  - name: agentops-postgres
    databaseName: agentops
    user: agentops
    plan: free
    region: oregon
    ipAllowList: []  # Allow from anywhere (Render services)
    postgresMajorVersion: 15

  - name: agentops-redis
    plan: free
    region: oregon
    ipAllowList: []  # Allow from anywhere (Render services)
    version: 7
