<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>TaskMaster Dashboard - Hardened</title>
    <style>
        /* Reset and Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #1a202c 0%, #2d3748 100%); 
            min-height: 100vh; 
            color: #e2e8f0; 
            line-height: 1.6;
        }
        
        /* Header */
        .header { 
            background: rgba(26, 32, 44, 0.95); 
            backdrop-filter: blur(10px); 
            padding: 20px 40px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        
        .header h1 { 
            font-size: 28px; 
            font-weight: 700; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .header-left { display: flex; align-items: center; gap: 20px; }
        
        /* External Links */
        .header-links {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-link {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .header-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .header-link-icon {
            width: 14px;
            height: 14px;
        }
        
        /* Health Indicator */
        .health-container {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            font-size: 12px;
        }
        
        .health-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .health-dot.live { background: #48bb78; }
        .health-dot.stale { background: #ed8936; animation: none; }
        .health-dot.error { background: #f56565; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .health-status {
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .header-stats { 
            display: flex; 
            gap: 16px; 
            font-size: 14px; 
            color: #a0aec0; 
        }
        
        .header-stats span:not(:last-child)::after {
            content: '|';
            margin-left: 16px;
            opacity: 0.3;
        }
        
        /* Stats Grid */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            padding: 30px 40px; 
        }
        
        .stat-card { 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            padding: 24px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        
        .stat-card:hover { 
            transform: translateY(-4px); 
            background: rgba(255,255,255,0.08); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); 
        }
        
        .stat-card.backlog { border-left: 4px solid #ed8936; }
        .stat-card.in-progress { border-left: 4px solid #4299e1; }
        .stat-card.completed { border-left: 4px solid #48bb78; }
        .stat-card.blocked { border-left: 4px solid #f56565; }
        
        .stat-number { 
            font-size: 36px; 
            font-weight: 700; 
            margin-bottom: 8px; 
        }
        
        .stat-label { 
            font-size: 12px; 
            color: #a0aec0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        /* Board */
        .board { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 24px; 
            padding: 0 40px 40px; 
            min-height: 500px;
        }
        
        .column { 
            background: rgba(26, 32, 44, 0.6); 
            border-radius: 16px; 
            padding: 20px; 
            min-height: 400px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        
        .column-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 16px; 
            padding-bottom: 16px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        
        .column-title { 
            font-size: 14px; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #e2e8f0; 
        }
        
        .column-count { 
            background: rgba(255,255,255,0.1); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 13px; 
            font-weight: 600; 
        }
        
        .tasks-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        /* Task Cards */
        .task-card { 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            padding: 16px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            border: 1px solid rgba(255,255,255,0.05); 
            position: relative; 
        }
        
        .task-card:hover { 
            transform: translateY(-2px); 
            background: rgba(255,255,255,0.08); 
            box-shadow: 0 4px 16px rgba(0,0,0,0.2); 
        }
        
        .task-card.backlog { border-left: 3px solid #ed8936; }
        .task-card.in-progress { border-left: 3px solid #4299e1; }
        .task-card.completed { border-left: 3px solid #48bb78; }
        .task-card.blocked { border-left: 3px solid #f56565; }
        
        .task-priority { 
            position: absolute; 
            top: 12px; 
            right: 12px; 
            font-size: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            padding: 4px 8px; 
            border-radius: 4px; 
        }
        
        .task-priority.critical { background: #f56565; color: white; }
        .task-priority.high { background: #ed8936; color: white; }
        .task-priority.medium { background: #4299e1; color: white; }
        .task-priority.low { background: #718096; color: white; }
        
        .task-id { 
            font-size: 11px; 
            color: #718096; 
            margin-bottom: 4px; 
            font-family: 'SF Mono', monospace;
        }
        
        .task-title { 
            font-size: 14px; 
            font-weight: 600; 
            color: #e2e8f0; 
            line-height: 1.4; 
            margin-bottom: 8px;
            word-break: break-word;
        }
        
        .task-tags { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 6px; 
            margin-bottom: 12px; 
        }
        
        .task-tag { 
            font-size: 10px; 
            color: #a0aec0; 
            background: rgba(255,255,255,0.1); 
            padding: 3px 8px; 
            border-radius: 12px; 
        }
        
        .task-footer { 
            display: flex; 
            justify-content: space-between; 
            font-size: 11px; 
            color: #718096; 
            margin-top: 8px; 
        }
        
        /* Modal */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        
        .modal.active { display: flex; }
        
        .modal-content { 
            background: #1a202c; 
            border-radius: 16px; 
            padding: 32px; 
            max-width: 600px; 
            width: 100%; 
            max-height: 90vh; 
            overflow-y: auto; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 20px; 
        }
        
        .modal-title { 
            font-size: 20px; 
            font-weight: 700; 
            color: #e2e8f0; 
            flex: 1; 
            margin-right: 16px;
            word-break: break-word;
        }
        
        .modal-close { 
            background: none; 
            border: none; 
            color: #718096; 
            font-size: 24px; 
            cursor: pointer; 
            padding: 0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        
        .modal-close:hover { 
            color: #e2e8f0; 
            background: rgba(255,255,255,0.05);
        }
        
        .modal-section { 
            margin-bottom: 20px; 
            padding-bottom: 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        
        .modal-section:last-child { 
            border-bottom: none; 
            margin-bottom: 0; 
        }
        
        .modal-label { 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #718096; 
            margin-bottom: 8px; 
        }
        
        .modal-value { 
            font-size: 14px; 
            color: #e2e8f0; 
            line-height: 1.6; 
        }
        
        .modal-value pre-wrap {
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .progress-bar { 
            background: rgba(255,255,255,0.1); 
            border-radius: 4px; 
            height: 8px; 
            margin-top: 8px; 
            overflow: hidden; 
        }
        
        .progress-fill { 
            background: linear-gradient(90deg, #48bb78 0%, #38a169 100%); 
            height: 100%; 
            border-radius: 4px; 
            transition: width 0.3s ease; 
        }
        
        .checklist { 
            list-style: none;
            margin-top: 12px;
        }
        
        .checklist-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 8px 0; 
        }
        
        .checklist-checkbox { 
            width: 18px; 
            height: 18px; 
            border: 2px solid rgba(255,255,255,0.3); 
            border-radius: 4px; 
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .checklist-checkbox.checked { 
            background: #48bb78; 
            border-color: #48bb78; 
        }
        
        .checklist-checkbox.checked::after {
            content: '?';
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .checklist-text { 
            font-size: 14px; 
            color: #e2e8f0; 
        }
        
        .checklist-text.checked { 
            text-decoration: line-through; 
            color: #718096; 
        }
        
        .modal-priority { 
            display: inline-block;
            padding: 4px 12px; 
            border-radius: 4px; 
            font-size: 12px; 
            font-weight: 600; 
            text-transform: uppercase;
        }
        
        .modal-priority.critical { background: #f56565; color: white; }
        .modal-priority.high { background: #ed8936; color: white; }
        .modal-priority.medium { background: #4299e1; color: white; }
        .modal-priority.low { background: #718096; color: white; }
        
        .modal-tag {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 4px;
        }
    </style>
</head>
